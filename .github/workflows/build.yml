name: Build APK

on:
  workflow_dispatch:        # מאפשר הרצה ידנית מלשונית Actions
  push:
    branches: [ master, main ]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 120     # הבנייה הנייטיבית ארוכה — אל תיתן לה ליפול על timeout ברירת מחדל

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK / build-tools / platform / cmake
        run: |
          sdkmanager --install \
            "platforms;android-35" \
            "build-tools;35.0.0" \
            "ndk;27.2.12479018" \
            "cmake;3.22.1"

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle', 'gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Build debug APK (afat / universal)
        run: ./gradlew :TMessagesProj_App:assembleAfatDebug --stacktrace --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: telegram-bengueta-apk
          path: TMessagesProj_App/build/outputs/apk/**/*.apk
          if-no-files-found: error
